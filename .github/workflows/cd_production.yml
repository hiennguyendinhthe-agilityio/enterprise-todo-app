name: CD — Release to Production

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play track (internal / alpha / beta / production)'
        required: true
        default: 'internal'

env:
  FLUTTER_VERSION: '3.44.3'
  JAVA_VERSION: '17'

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Upload Android App Bundle to Google Play
  # ────────────────────────────────────────────────────────────────────────
  deploy-android-production:
    name: Android to Google Play (Production)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create env/prod.json
        env:
          PROD_API_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          mkdir -p env
          printf '{\n  "APP_ENV": "production",\n  "APP_NAME": "Todo App",\n  "API_BASE_URL": "%s",\n  "ENABLE_LOGGING": "false",\n  "ENABLE_CRASHLYTICS": "true"\n}\n' "$PROD_API_URL" > env/prod.json

      - name: Validate Android release secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          GOOGLE_PLAY_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
        run: |
          test -n "$KEYSTORE_BASE64"
          test -n "$STORE_PASSWORD"
          test -n "$KEY_PASSWORD"
          test -n "$KEY_ALIAS"
          test -n "$GOOGLE_PLAY_SERVICE_ACCOUNT"

      - name: Decode Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build App Bundle (Production)
        env:
          KEY_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PATH: release.keystore
        run: |
          flutter build appbundle \
            --release \
            --dart-define-from-file=env/prod.json \
            --flavor prod \
            -t lib/main_enterprise_todo.dart \
            --obfuscate \
            --split-debug-info=debug-info/

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.example.flutter_application_2
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: 'completed'
          changesNotSentForReview: true

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-info-${{ github.ref_name }}
          path: debug-info/
          retention-days: 90

  # ────────────────────────────────────────────────────────────────────────
  # Job 2: Build & Upload iOS IPA to TestFlight / App Store
  # ────────────────────────────────────────────────────────────────────────
  deploy-ios-production:
    name: iOS to App Store (TestFlight)
    runs-on: macos-latest
    environment: production
    if: ${{ vars.ENABLE_IOS_CD == 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Create env/prod.json
        env:
          PROD_API_URL: ${{ secrets.PROD_API_BASE_URL }}
        run: |
          mkdir -p env
          printf '{\n  "APP_ENV": "production",\n  "APP_NAME": "Todo App",\n  "API_BASE_URL": "%s",\n  "ENABLE_LOGGING": "false",\n  "ENABLE_CRASHLYTICS": "true"\n}\n' "$PROD_API_URL" > env/prod.json

      - name: Import iOS Distribution Certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT }}
          p12-password: ${{ secrets.IOS_CERT_PASSWORD }}

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          PP_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build IPA (Production)
        run: |
          flutter build ipa \
            --release \
            --dart-define-from-file=env/prod.json \
            --flavor prod \
            -t lib/main_enterprise_todo.dart \
            --obfuscate \
            --split-debug-info=debug-info/

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
